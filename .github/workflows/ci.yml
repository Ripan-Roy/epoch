name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust format, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install pinned Rust toolchain
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component clippy
          --component rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-targets
      - run: cargo build --locked --workspace --all-targets

  go-contracts:
    name: Go and Protobuf contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - name: Install pinned Buf CLI
        run: go install github.com/bufbuild/buf/cmd/buf@v1.72.0
      - name: Lint workflows and shell scripts
        run: |
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color
          shellcheck tests/integration/smoke.sh
      - name: Check Go formatting
        run: |
          mapfile -t go_files < <(find control operator sdk/go -type f -name '*.go' 2>/dev/null)
          if (( ${#go_files[@]} > 0 )); then
            unformatted="$(gofmt -l "${go_files[@]}")"
            test -z "$unformatted" || { printf '%s\n' "$unformatted"; exit 1; }
          fi
      - run: buf lint
      - name: Reject stale generated bindings
        run: |
          buf generate
          git diff --exit-code -- sdk/go/gen
          test -z "$(git status --porcelain --untracked-files=all -- sdk/go/gen)"
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  python:
    name: Python format, lint, test, package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'
      - run: python -m pip install ruff==0.15.19
      - run: ruff format --check sdk/python
      - run: ruff check sdk/python
      - name: Run Python SDK tests
        run: PYTHONPATH=sdk/python/src python -m unittest discover -s sdk/python/tests -v
      - name: Build an installable SDK wheel
        run: python -m pip wheel --no-deps --wheel-dir /tmp/epoch-python-wheel sdk/python

  web:
    name: Console format, lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build

  integration:
    name: Cross-language standalone smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [rust, go-contracts, python]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'
      - run: bash tests/integration/smoke.sh

  container:
    name: Container and Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - run: docker compose -f deploy/compose/docker-compose.yml config --quiet
      - run: docker build --file deploy/docker/Dockerfile.node --tag epoch/node:ci .
      - name: Start and health-check the image
        run: |
          docker run --detach --rm --name epoch-node-ci-smoke \
            --publish 127.0.0.1:17661:7601 epoch/node:ci
          for _ in {1..100}; do
            if curl --fail --silent --show-error http://127.0.0.1:17661/healthz; then
              exit 0
            fi
            sleep 0.1
          done
          docker logs epoch-node-ci-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker stop --timeout 10 epoch-node-ci-smoke || true
