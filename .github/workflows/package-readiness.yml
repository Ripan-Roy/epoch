name: Package readiness (non-publishing)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Package policy tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'
      - name: Test package safety policy
        run: python -m unittest discover -s tests/release -v
      - name: Validate source-only policy
        run: python scripts/release/check-package-policy.py --mode shape
      - name: Reject cross-ecosystem version drift
        run: python scripts/release/check-package-policy.py --scope versions

  rust:
    name: Private Rust package boundary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'
      - run: scripts/release/check-rust.sh

  go:
    name: Provisional Go module consumer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-go@v7.0.0
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'
      - run: scripts/release/check-go.sh

  java:
    name: Java artifact and clean consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: sdk/java/pom.xml
      - run: scripts/release/check-java.sh

  python:
    name: Python artifacts (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: scripts/release/check-python.sh

  typescript:
    name: Planned/private TypeScript boundary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: scripts/release/check-typescript.sh
