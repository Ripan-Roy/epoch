name: GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'deployment' }}
  cancel-in-progress: true

jobs:
  build:
    name: Verify and package documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      VITE_BASE_PATH: /epoch/
      VITE_DEFAULT_PAGE: docs
      VITE_DOCS_ONLY: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Set up pinned Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate
          test "$(pnpm --version)" = "10.28.0"

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm --filter @epoch/console format:check

      - name: Lint
        run: pnpm --filter @epoch/console lint

      - name: Type-check
        run: pnpm --filter @epoch/console typecheck

      - name: Build for project Pages
        run: pnpm --filter @epoch/console build

      - name: Verify Pages base path
        run: |
          test -f console/dist/index.html
          grep -Eq '(src|href)="/epoch/' console/dist/index.html
          grep -Rq 'One lifecycle, three real clients' console/dist/assets
          grep -Rq 'Package publication status' console/dist/assets
          grep -Rq 'No registry upload' console/dist/assets
          if grep -Eq '(src|href)="/assets/' console/dist/index.html; then
            echo 'build contains an asset URL outside /epoch/' >&2
            exit 1
          fi
          if grep -RqE '/healthz|Refresh node' console/dist/assets; then
            echo 'docs-only build contains the live console runtime' >&2
            exit 1
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: console/dist

  docs-quickstarts:
    name: Execute displayed SDK quickstarts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal

      - name: Set up pinned Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum

      - name: Set up supported Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.11'

      - name: Set up pinned Java
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: sdk/java/pom.xml

      - name: Execute the exact published source
        run: bash tests/integration/docs-quickstarts.sh

  deploy:
    name: Deploy documentation
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [build, docs-quickstarts]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
