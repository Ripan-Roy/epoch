version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Kolkata
    cooldown:
      default-days: 7
    groups:
      compatible-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [patch]
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
    allow:
      - dependency-name: "*"
        update-types: [version-update:semver-patch]
  - package-ecosystem: gomod
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
      day: tuesday
      time: "02:00"
      timezone: Asia/Kolkata
    cooldown:
      default-days: 7
    groups:
      compatible-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
