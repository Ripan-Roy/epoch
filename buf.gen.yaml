version: v2
clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: epoch.local/epoch/sdk/go/gen

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: sdk/go/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: sdk/go/gen
    opt:
      - paths=source_relative
