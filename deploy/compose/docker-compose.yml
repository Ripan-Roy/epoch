name: epoch-development

services:
  epoch-node:
    image: epoch/node:dev
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.node
      args:
        RUST_VERSION: 1.97.1
    environment:
      EPOCH_DEPLOYMENT_MODE: standalone
      EPOCH_NODE_ID: dev-node-1
      EPOCH_DATA_DIR: /var/lib/epoch
      EPOCH_GRPC_ADDR: 0.0.0.0:7600
      EPOCH_HTTP_LISTEN: 0.0.0.0:7601
      EPOCH_METRICS_ADDR: 0.0.0.0:9464
      EPOCH_WAL_SEGMENT_BYTES: ${EPOCH_WAL_SEGMENT_BYTES:-67108864}
      EPOCH_ALLOWED_ORIGINS: ${EPOCH_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:4173,http://localhost:4173}
      EPOCH_LOG: ${EPOCH_LOG:-epoch=debug,tower_http=info}
    ports:
      - "${EPOCH_GRPC_PORT:-7600}:7600"
      - "${EPOCH_HTTP_PORT:-7601}:7601"
      - "${EPOCH_METRICS_PORT:-9464}:9464"
    volumes:
      - epoch-data:/var/lib/epoch
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - http://127.0.0.1:7601/healthz
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6

volumes:
  epoch-data:
    name: epoch-development-data
